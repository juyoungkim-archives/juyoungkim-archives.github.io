<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김주영 / Kim Juyoung — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>

  :root {
    --ink: #1a1a2e;
    --navy: #16213e;
    --cream: #f5f0e8;
    --parchment: #ede6d6;
    --stamp: #8b1a1a;
    --stamp-light: #b8352b;
    --gold: #c9a84c;
    --muted: #6b6560;
    --rule: #c8bfb0;
    --mono: 'IBM Plex Mono', monospace;
    --serif-kr: 'Noto Serif KR', serif;
    --sans-kr: 'Noto Sans KR', sans-serif;
    --serif-en: 'EB Garamond', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--serif-kr);
    line-height: 1.7;
    font-size: 14px;
  }

  /* ── TOP TOOLBAR ── */
  .toolbar {
    background: var(--navy);
    padding: 12px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--gold);
  }

  .toolbar-brand {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .toolbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .lang-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .lang-btn.active {
    background: var(--gold);
    color: var(--navy);
    border-color: var(--gold);
    font-weight: 500;
  }

  .lang-btn:hover:not(.active) {
    border-color: var(--gold);
    color: var(--gold);
  }

  .date-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-label {
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
  }

  .date-input {
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 5px 10px;
    border-radius: 2px;
    outline: none;
    width: 110px;
  }

  .date-input:focus { border-color: var(--gold); }

  .download-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 16px;
    background: var(--stamp);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .download-btn:hover { background: var(--stamp-light); }

  /* ── LAYOUT ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── HERO ── */
  .hero {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    gap: 36px;
    align-items: start;
    padding: 40px 0 36px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 48px;
  }

  .hero-photo {
    width: 140px;
    height: 175px;
    object-fit: cover;
    object-position: center top;
    filter: sepia(10%) contrast(1.05);
    border: 1px solid var(--rule);
  }

  .hero-photo-placeholder {
    width: 140px;
    height: 175px;
    background: var(--parchment);
    border: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    text-align: center;
    line-height: 1.5;
  }

  .hero-info { padding-top: 4px; }

  .hero-name {
    font-family: var(--serif-kr);
    font-size: 36px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .hero-name .name-sub {
    display: block;
    font-size: 18px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.01em;
    margin-top: 4px;
    font-family: var(--sans-kr);
  }

  .hero-logo {
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding-top: 4px;
    min-width: 320px;
  }

  .hero-logo img {
    max-height: 160px;
    max-width: 320px;
    object-fit: contain;
  }

  .hero-logo-placeholder {
    width: 320px;
    height: 160px;
    border: 1px dashed var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-align: center;
    border-radius: 2px;
    line-height: 1.5;
  }

  .hero-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--stamp);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

.hero-name .name-title {
  display: inline;
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.01em;
  margin-left: 12px;
  font-family: var(--sans-kr);
}

.hero-name .name-title-org {
  font-size: 16px;
  font-weight: 300;
  color: var(--muted);
  margin-left: 4px;
}

  .hero-title::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--stamp);
  }

  .hero-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 16px;
    align-items: baseline;
  }

  .meta-key {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .meta-val {
    font-size: 13px;
    color: var(--ink);
  }

  .meta-val a { color: var(--stamp); text-decoration: none; border-bottom: 1px dotted var(--stamp); }
  .meta-val a:hover { color: var(--stamp-light); }

  /* ── SECTION ── */
  .section { margin-bottom: 48px; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--ink);
  }

  .section-stamp {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
    background: var(--ink);
    padding: 3px 8px;
    border-radius: 1px;
  }

  .section-title {
    font-family: var(--serif-kr);
    font-size: 18px;
    font-weight: 600;
    color: var(--navy);
  }

  /* ── TABLE ── */
  .prof-table {
    width: 100%;
    border-collapse: collapse;
  }

  .prof-table thead tr {
    background: var(--navy);
    color: #fff;
  }

  .prof-table thead th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
    padding: 8px 12px;
    text-align: left;
    white-space: nowrap;
  }

  .prof-table tbody tr {
    border-bottom: 1px solid var(--rule);
    transition: background 0.15s;
  }

  .prof-table tbody tr:hover { background: var(--parchment); }

  .prof-table tbody td {
    padding: 10px 12px;
    font-size: 13px;
    vertical-align: top;
  }

  .prof-table tbody td.mono {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .prof-table tbody td.stamp-cell {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink);
    white-space: nowrap;
  }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 1px;
    white-space: nowrap;
    border: 1px solid;
  }

  .badge-current { border-color: var(--stamp); color: var(--stamp); }
  .badge-former  { border-color: var(--rule);  color: var(--muted); }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border: 1px solid var(--rule);
    color: var(--muted);
    border-radius: 1px;
    white-space: nowrap;
  }

  .tag.pm          { border-color: var(--stamp); color: var(--stamp); }
  .tag.pl          { border-color: var(--gold);  color: #a07a20; }
  .tag.consulting  { border-color: var(--navy);  color: var(--navy); }

  .paper-link {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--stamp);
    text-decoration: none;
    letter-spacing: 0.04em;
    border-bottom: 1px dotted var(--stamp);
  }

  .paper-link:hover { color: var(--stamp-light); }

  /* ── FOOTER ── */
  .page-footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: flex-end;
  }

  .updated-stamp {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    border: 1px solid var(--rule);
    padding: 4px 12px;
    border-radius: 1px;
  }

  /* ── PRINT ── */
  @media print {
    .toolbar { display: none !important; }
    body { font-size: 12px; }
    .hero { padding-top: 0; }
    .container { padding: 20px; max-width: 100%; }
    .section { margin-bottom: 28px; }
    .prof-table tbody tr:hover { background: transparent; }
  }

  /* ── LANGUAGE TOGGLE ── */
  [data-lang="en"] { display: none; }
  body.en [data-lang="kr"] { display: none; }
  body.en [data-lang="en"] { display: revert; }
  body.en table[data-lang="en"] { display: table; }
  body.en .hero-name[data-lang="en"] { display: block; }
  body.en .hero-name[data-lang="kr"] { display: none; }
  body.en .hero-title[data-lang="kr"] { display: none; }
  body.en .hero-title[data-lang="en"] { display: flex; }
  body.en .section-title { font-family: var(--serif-en); }

  @media (max-width: 640px) {
    .hero { grid-template-columns: 1fr; }
    .hero-logo { justify-content: flex-start; }
    .hero-photo, .hero-photo-placeholder { width: 100px; height: 125px; }
    .hero-name { font-size: 28px; }
    .hero-name .name-sub { font-size: 14px; }
    .toolbar { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
    .container { padding: 24px 16px 60px; }
  }



  /* ═══ ADMIN SYSTEM ═══ */
  .tb-admin-btn {
    font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    padding:5px 13px;background:transparent;
    border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.38);
    cursor:pointer;border-radius:2px;transition:all .2s;
  }
  .tb-admin-btn:hover{border-color:var(--gold);color:var(--gold);}
  .adm-overlay{display:none;position:fixed;inset:0;background:rgba(10,14,30,.72);z-index:400;align-items:center;justify-content:center;padding:20px;}
  .adm-overlay.on{display:flex;}
  .adm-login-box{background:var(--cream);border:1px solid var(--rule);border-top:3px solid var(--stamp);padding:36px 40px;width:340px;box-shadow:0 24px 64px rgba(0,0,0,.35);}
  .adm-pw-box{background:var(--cream);border:1px solid var(--rule);border-top:3px solid var(--gold);padding:36px 40px;width:340px;box-shadow:0 24px 64px rgba(0,0,0,.35);}
  .adm-box-title{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--stamp);margin-bottom:22px;}
  .adm-field{margin-bottom:14px;}
  .adm-label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
  .adm-input{width:100%;padding:10px 12px;border:1px solid var(--rule);background:#fff;font-family:var(--mono);font-size:13px;color:var(--ink);outline:none;border-radius:2px;}
  .adm-input:focus{border-color:var(--navy);}
  .adm-err{font-family:var(--mono);font-size:11px;color:var(--stamp);margin-top:8px;display:none;}
  .adm-row{display:flex;gap:8px;margin-top:22px;}
  .adm-btn{flex:1;padding:10px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;border-radius:2px;border:none;transition:background .2s;}
  .adm-btn.primary{background:var(--navy);color:#fff;}
  .adm-btn.primary:hover{background:var(--stamp);}
  .adm-btn.secondary{background:transparent;border:1px solid var(--rule);color:var(--muted);}
  .adm-btn.secondary:hover{border-color:var(--navy);color:var(--navy);}
  .adm-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:2px solid var(--gold);padding:0 24px;height:52px;align-items:center;justify-content:space-between;z-index:300;font-family:var(--mono);font-size:11px;}
  .adm-bar.on{display:flex;}
  .adm-bar-left{color:var(--gold);letter-spacing:.12em;display:flex;align-items:center;gap:10px;}
  .adm-bar-center{display:flex;gap:8px;}
  .adm-bar-right{display:flex;gap:8px;align-items:center;}
  .adm-bar-btn{font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:7px 16px;cursor:pointer;border-radius:2px;border:none;transition:all .2s;}
  .adm-bar-btn.update{background:var(--gold);color:var(--navy);font-weight:700;}
  .adm-bar-btn.update:hover{background:#dbb84a;}
  .adm-bar-btn.outline{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.65);}
  .adm-bar-btn.outline:hover{border-color:var(--gold);color:var(--gold);}
  .adm-bar-btn.danger{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.4);}
  .adm-bar-btn.danger:hover{border-color:var(--stamp);color:var(--stamp);}
  body.adm-active{padding-bottom:52px;}
  .adm-panel{display:none;position:fixed;inset:0;background:var(--cream);z-index:500;flex-direction:column;overflow:hidden;}
  .adm-panel.on{display:flex;}
  .adm-panel-head{background:var(--navy);border-bottom:2px solid var(--gold);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .adm-panel-head-left{display:flex;align-items:center;gap:16px;}
  .adm-panel-head-title{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--gold);}
  .adm-panel-close{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);font-family:var(--mono);font-size:11px;padding:5px 14px;cursor:pointer;border-radius:2px;transition:all .2s;}
  .adm-panel-close:hover{border-color:var(--stamp);color:var(--stamp);}
  .adm-panel-body{display:flex;flex:1;overflow:hidden;}
  .adm-save-json-btn{font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:6px 16px;background:var(--stamp);color:#fff;border:none;cursor:pointer;border-radius:2px;transition:background .2s;}
  .adm-save-json-btn:hover{background:var(--stamp-light);}
  .adm-section-list{width:210px;flex-shrink:0;border-right:1px solid var(--rule);overflow-y:auto;padding:12px 0;background:#f0ebe0;}
  .adm-sec-item{padding:11px 18px;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.04em;border-left:3px solid transparent;transition:all .15s;display:flex;flex-direction:column;gap:2px;}
  .adm-sec-item .sec-stamp{font-size:9px;color:var(--stamp);letter-spacing:.12em;}
  .adm-sec-item .sec-name{color:var(--ink);font-size:12px;}
  .adm-sec-item:hover{background:var(--parchment);}
  .adm-sec-item.active{border-left-color:var(--gold);background:var(--cream);}
  .adm-sec-item.active .sec-name{font-weight:700;color:var(--navy);}
  .adm-editor{flex:1;overflow-y:auto;padding:24px 28px;}
  .adm-editor-placeholder{height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.08em;flex-direction:column;gap:10px;}
  .adm-editor-title{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--stamp);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
  .adm-add-btn{margin-left:auto;padding:6px 14px;background:var(--navy);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.08em;border:none;cursor:pointer;border-radius:2px;transition:background .2s;}
  .adm-add-btn:hover{background:var(--stamp);}
  .adm-sort-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;padding:7px 12px;background:var(--parchment);border:1px solid var(--rule);border-radius:2px;font-family:var(--mono);font-size:10px;color:var(--muted);}
  .adm-sort-sel{font-family:var(--mono);font-size:11px;padding:3px 8px;border:1px solid var(--rule);background:#fff;color:var(--ink);border-radius:2px;}
  .adm-sort-btn{font-family:var(--mono);font-size:10px;padding:4px 12px;cursor:pointer;border-radius:2px;border:1px solid var(--navy);color:var(--navy);background:transparent;transition:all .15s;}
  .adm-sort-btn:hover{background:var(--navy);color:#fff;}
  .adm-sort-hint{margin-left:auto;opacity:.55;font-size:10px;}
  .adm-table{width:100%;border-collapse:collapse;font-size:12px;}
  .adm-table thead tr{background:var(--navy);color:#fff;}
  .adm-table thead th{font-family:var(--mono);font-size:10px;letter-spacing:.1em;font-weight:400;padding:8px 10px;text-align:left;white-space:nowrap;}
  .adm-table tbody tr{border-bottom:1px solid var(--rule);cursor:grab;}
  .adm-table tbody tr:hover{background:var(--parchment);}
  .adm-table tbody tr.drag-over{background:#e8f0fe;outline:2px solid var(--gold);}
  .adm-table tbody tr.dragging{opacity:.35;cursor:grabbing;}
  .adm-table tbody td{padding:8px 10px;vertical-align:top;font-family:var(--sans-kr);font-size:12px;}
  .adm-table tbody td.adm-actions{white-space:nowrap;cursor:default;}
  .adm-table tbody td.adm-handle{width:22px;text-align:center;color:#ccc;font-size:13px;cursor:grab;user-select:none;padding:8px 2px 8px 8px;}
  .adm-table tbody tr:hover td.adm-handle{color:var(--muted);}
  .adm-row-btn{font-family:var(--mono);font-size:10px;padding:3px 8px;cursor:pointer;border-radius:2px;border:1px solid;margin-right:3px;transition:all .15s;background:transparent;}
  .adm-row-btn.edit{border-color:var(--navy);color:var(--navy);}
  .adm-row-btn.edit:hover{background:var(--navy);color:#fff;}
  .adm-row-btn.del{border-color:var(--stamp);color:var(--stamp);}
  .adm-row-btn.del:hover{background:var(--stamp);color:#fff;}
  .adm-row-btn.mv{border-color:var(--rule);color:var(--muted);padding:3px 6px;}
  .adm-row-btn.mv:hover{background:var(--parchment);border-color:var(--muted);}
  .adm-order-bar{margin-top:12px;padding:10px 14px;background:#fffbe6;border:1px solid var(--gold);border-radius:2px;display:none;align-items:center;gap:12px;font-family:var(--mono);font-size:11px;color:#7a6010;}
  .adm-order-bar.on{display:flex;}
  .adm-save-order-btn{margin-left:auto;padding:6px 18px;background:var(--gold);color:var(--navy);font-weight:700;font-family:var(--mono);font-size:11px;border:none;border-radius:2px;cursor:pointer;}
  .adm-save-order-btn:hover{background:#dbb84a;}
  .adm-dialog-overlay{display:none;position:absolute;inset:0;background:rgba(10,14,30,.6);z-index:10;align-items:center;justify-content:center;padding:24px;}
  .adm-dialog-overlay.on{display:flex;}
  .adm-dialog{background:var(--cream);border:1px solid var(--rule);border-top:3px solid var(--gold);padding:28px 32px;width:100%;max-width:720px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .adm-dialog-title{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--gold);margin-bottom:20px;text-transform:uppercase;}
  .adm-dialog-fields{display:flex;flex-direction:column;gap:14px;}
  .adm-dialog-row{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;}
  .adm-dfield{display:flex;flex-direction:column;gap:5px;}
  .adm-dlabel{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .lang-badge{font-size:9px;padding:1px 5px;border-radius:1px;border:1px solid;line-height:1.4;}

  .adm-translate-btn{font-family:var(--mono);font-size:10px;padding:2px 8px;background:transparent;border:1px solid var(--gold);color:#a07a20;cursor:pointer;border-radius:2px;transition:all .15s;}
  .adm-translate-btn:hover{background:var(--gold);color:var(--navy);}
  .adm-dinput{padding:8px 10px;border:1px solid var(--rule);background:#fff;font-family:var(--sans-kr);font-size:13px;color:var(--ink);outline:none;border-radius:2px;transition:border-color .15s;}
  .adm-dinput:focus{border-color:var(--gold);}
  .adm-dinput.translating{background:#fffbe6;border-color:var(--gold);}
  .adm-translate-spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-left:4px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .adm-dialog-actions{display:flex;gap:8px;margin-top:20px;}

  .adm-dialog-btn.cancel{background:transparent;border:1px solid var(--rule);color:var(--muted);}

  .adm-log-panel{display:none;position:fixed;inset:0;background:var(--cream);z-index:600;flex-direction:column;overflow:hidden;}
  .adm-log-panel.on{display:flex;}
  .adm-log-head{background:var(--navy);border-bottom:2px solid var(--gold);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}

  .adm-log-filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .adm-log-clear{margin-left:auto;font-family:var(--mono);font-size:10px;padding:5px 12px;cursor:pointer;border-radius:2px;border:1px solid var(--stamp);color:var(--stamp);background:transparent;}
  .adm-log-clear:hover{background:var(--stamp);color:#fff;}
  .adm-log-entry{border-bottom:1px solid var(--rule);padding:12px 0;display:grid;grid-template-columns:160px 60px 1fr;gap:10px;align-items:start;}
  .adm-log-time{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .adm-log-action{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:1px;text-align:center;white-space:nowrap;}
  .adm-log-action.add{background:#e6f4ea;color:#2d6a4f;border:1px solid #b7dfc9;}
  .adm-log-action.edit{background:#e8f0fe;color:#1a56c4;border:1px solid #b3c8f9;}
  .adm-log-action.del{background:#fde8e8;color:#8b1a1a;border:1px solid #f5b8b8;}
  .adm-log-action.order{background:#fff3e0;color:#7a4a00;border:1px solid #ffd59e;}
  .adm-log-desc{font-family:var(--sans-kr);font-size:12px;color:var(--ink);line-height:1.5;}
  .adm-log-empty{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;padding-top:60px;}
  .adm-toast{position:fixed;top:68px;right:24px;background:var(--navy);color:var(--gold);font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:10px 20px;border-radius:2px;z-index:800;opacity:0;pointer-events:none;transition:opacity .25s;border:1px solid rgba(201,168,76,.4);}
  .adm-toast.on{opacity:1;}
  @media print{.adm-bar,.tb-admin-btn{display:none !important;}body{padding-bottom:0 !important;}}

</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar">
  <span class="toolbar-brand">ARCHIVAL PROFILE</span>
  <div class="toolbar-actions">
    <div class="date-group">
      <span class="date-label" data-lang="kr">업데이트</span>
      <span class="date-label" data-lang="en">Updated</span>
      <input type="date" class="date-input" id="updateDate" value="2026-06-19">
    </div>
    <button class="lang-btn active" id="btnKr" onclick="setLang('kr')">한국어</button>
    <button class="lang-btn" id="btnEn" onclick="setLang('en')">English</button>
    <button class="tb-admin-btn" id="admLoginBtn" onclick="admShowLogin()">관리자</button>
    <button class="tb-admin-btn" id="admLoginBtn" onclick="admShowLogin()">관리자</button>
    <button class="download-btn" onclick="downloadPDF()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

</div>

<div class="container" id="mainContent">
  <div class="hero" id="heroBlock"></div>
  <div id="sectionsBlock"></div>
  <div class="page-footer">
    <span class="updated-stamp" id="footerStamp">UPDATED · –</span>
  </div>
</div>

<!-- LOGIN -->
<div class="adm-overlay" id="admLogin">
  <div class="adm-login-box">
    <div class="adm-box-title">ADMIN · 관리자 로그인</div>
    <div class="adm-field"><label class="adm-label">Password</label>
      <input type="password" class="adm-input" id="admPw" placeholder="비밀번호 입력"></div>
    <div class="adm-err" id="admErr">⚠ 비밀번호가 올바르지 않습니다.</div>
    <div class="adm-row">
      <button class="adm-btn primary" onclick="admDoLogin()">로그인</button>
      <button class="adm-btn secondary" onclick="admHideLogin()">취소</button>

  </div>
</div>

<!-- ADMIN BAR -->
<div class="adm-bar" id="admBar">
  <div class="adm-bar-left">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--gold)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    ADMIN MODE ACTIVE
  </div>
  <div class="adm-bar-center">
    <button class="adm-bar-btn update" onclick="admOpenPanel()">✎ 콘텐츠 편집</button>
    <button class="adm-bar-btn outline" onclick="admOpenLog()">☰ 변경 로그</button>
  </div>
  <div class="adm-bar-right">
    <button class="adm-bar-btn outline" onclick="admOpenPwChange()">🔑 비밀번호 변경</button>
    <button class="adm-bar-btn danger" onclick="admLogout()">로그아웃</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="adm-panel" id="admPanel">
  <div class="adm-panel-head">
    <div class="adm-panel-head-left">
      <span class="adm-panel-head-title">✎ 콘텐츠 편집</span>
      <button class="adm-save-json-btn" onclick="admSaveJson()">⬇ data.json 저장</button>
    </div>
    <button class="adm-panel-close" onclick="admClosePanel()">✕ 닫기</button>
  </div>
  <div class="adm-panel-body">

      <div class="adm-editor-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>

<!-- LOG PANEL -->

  <div class="adm-log-head">

  <div class="adm-log-body">

      <button class="adm-log-filter-btn active" onclick="admFilterLog('all',this)">전체</button>

      <button class="adm-log-filter-btn" onclick="admFilterLog('order',this)">순서</button>
      <button class="adm-log-clear" onclick="admClearLog()">로그 초기화</button>

</div>

<!-- PASSWORD CHANGE -->
<div class="adm-overlay" id="admPwModal" style="z-index:700">
  <div class="adm-pw-box">
    <div class="adm-box-title" style="color:var(--gold)">🔑 비밀번호 변경</div>
    <div class="adm-field"><label class="adm-label">현재 비밀번호</label>
      <input type="password" class="adm-input" id="pwCurrent" placeholder="현재 비밀번호"></div>
    <div class="adm-field"><label class="adm-label">새 비밀번호</label>
      <input type="password" class="adm-input" id="pwNew" placeholder="새 비밀번호 (4자 이상)"></div>
    <div class="adm-field"><label class="adm-label">새 비밀번호 확인</label>
      <input type="password" class="adm-input" id="pwConfirm" placeholder="재입력"></div>
    <div class="adm-err" id="pwErr"></div>

      <button class="adm-btn primary" onclick="admSavePw()">변경 저장</button>

</div>

<div class="adm-toast" id="admToast"></div>

<script>

const ADM_PASS_DEFAULT = 'jari2024!';
const STORE_PFX = 'jari3_';

let PROFILE = null;
let admMode = false;
let admCurSecIdx = -1;
let admEditCtx = null;
let logFilter = 'all';
let _dragSrc = null;
let _transTimers = {};

function ST(k, v) {
  try {
    if (v === undefined) {
      const r = localStorage.getItem(STORE_PFX + k);
      return r !== null ? JSON.parse(r) : null;
    }
    localStorage.setItem(STORE_PFX + k, JSON.stringify(v));
  } catch(e) { return null; }
}
function getPass() { return ST('pass') || ADM_PASS_DEFAULT; }

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fetch('data.json?v=' + Date.now());
    if (!r.ok) throw new Error('load failed');
    PROFILE = await r.json();
  } catch(e) {
    const draft = ST('draft');
    if (draft) { PROFILE = draft; toast('⚠ data.json 로드 실패 — 로컬 임시본 표시 중'); }
    else {
      document.getElementById('mainContent').innerHTML =
        '<p style="padding:60px;font-family:monospace;color:#8b1a1a;">⚠ data.json 을 불러올 수 없습니다.<br>index.html과 같은 폴더에 data.json 이 있는지 확인하세요.</p>';
      return;
    }
  }
  renderProfile();
  bindKeys();
});

// ── RENDER ──
function renderProfile() {
  renderHero();
  renderSections();
  renderFooter();
}

function renderHero() {
  const m = PROFILE.meta;
  document.getElementById('heroBlock').innerHTML = `
    <img class="hero-photo" src="photo.png" alt="${m.name_kr}">
    <div class="hero-info">
      <div class="hero-name" data-lang="kr">${m.name_kr}
        <span class="name-title">${m.title_kr}<span class="name-title-org"></span></span>
        <span class="name-sub">${m.subtitle_kr}</span>
      </div>
      <div class="hero-name" data-lang="en" style="font-family:var(--serif-en);font-size:38px;font-weight:600;color:var(--navy);line-height:1.2;margin-bottom:4px;">${m.name_en}
        <span class="name-title">${m.title_en}</span>
        <span class="name-sub" style="font-family:var(--sans-kr);">${m.subtitle_en}</span>
      </div>
      <div style="height:12px"></div>
      <div class="hero-meta">
        <span class="meta-key" data-lang="kr">연락처</span><span class="meta-key" data-lang="en">Mobile</span>
        <span class="meta-val">${m.mobile}</span>
        <span class="meta-key">E-mail</span>
        <span class="meta-val"><a href="mailto:${m.email}">${m.email}</a></span>
        <span class="meta-key">Website</span>
        <span class="meta-val"><a href="https://${m.website}" target="_blank">${m.website}</a></span>
      </div>
    </div>
    <div class="hero-logo"><img src="logo.png" alt="J·ARI"></div>`;
}

function renderSections() {
  document.getElementById('sectionsBlock').innerHTML = PROFILE.sections.map((sec, si) =>
    `<div class="section" data-si="${si}">
      <div class="section-header">
        <span class="section-stamp">${sec.stamp}</span>
        <span class="section-title" data-lang="kr">${sec.title_kr}</span>
        <span class="section-title" data-lang="en">${sec.title_en}</span>
      </div>
      ${renderTable(sec.kr,'kr')}${renderTable(sec.en,'en')}
    </div>`
  ).join('');
}

function renderTable(t, lang) {
  if (!t || !t.headers.length) return '';
  return `<table class="prof-table" data-lang="${lang}">
    <thead><tr>${t.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${t.rows.map(row =>
      `<tr>${row.map((cell,ci) => {
        const isMono = isMonoCell(cell, t, ci);
        return `<td class="${isMono?'mono':''}">${cell}</td>`;
      }).join('')}</tr>`
    ).join('')}</tbody>
  </table>`;
}

function isMonoCell(cell, t, ci) {
  // date / year / period patterns
  const s = String(cell).trim();
  return /^\d{4}[.\-\/]/.test(s) || /^\d{4}$/.test(s) || (s.includes('–') && /\d{4}/.test(s));
}

function renderFooter() {
  const d = PROFILE.meta.updated || '–';
  document.getElementById('footerStamp').textContent = 'UPDATED · ' + d;
  const inp = document.getElementById('updateDate');
  if (inp && d !== '–') inp.value = d.replace(/\./g,'-');
}

// ── LANGUAGE ──
function setLang(lang) {
  document.body.classList.toggle('en', lang==='en');
  document.documentElement.lang = lang==='en' ? 'en' : 'ko';
  document.getElementById('btnKr').classList.toggle('active', lang==='kr');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
}

// ── DATE ──
document.getElementById('updateDate').addEventListener('change', function() {
  if (!admMode) return;
  PROFILE.meta.updated = this.value.replace(/-/g,'.');
  document.getElementById('footerStamp').textContent = 'UPDATED · ' + PROFILE.meta.updated;
  ST('draft', PROFILE);
});
function setTodayDate() {
  const n=new Date(), pad=x=>String(x).padStart(2,'0');
  PROFILE.meta.updated = `${n.getFullYear()}.${pad(n.getMonth()+1)}.${pad(n.getDate())}`;
  document.getElementById('footerStamp').textContent = 'UPDATED · ' + PROFILE.meta.updated;
  document.getElementById('updateDate').value = PROFILE.meta.updated.replace(/\./g,'-');
  ST('draft', PROFILE);
}

// ── PDF ──
function downloadPDF() {
  document.getElementById('toolbar').style.display='none';
  document.getElementById('admBar').style.display='none';
  window.print();
  document.getElementById('toolbar').style.display='';
  if (admMode) document.getElementById('admBar').style.display='';
}

// ── LOGIN ──
function admShowLogin() { document.getElementById('admLogin').classList.add('on'); setTimeout(()=>document.getElementById('admPw').focus(),50); }
function admHideLogin() { document.getElementById('admLogin').classList.remove('on'); document.getElementById('admErr').style.display='none'; }
function admDoLogin() {
  if (document.getElementById('admPw').value === getPass()) {
    admMode=true; admHideLogin();
    document.body.classList.add('adm-active');
    document.getElementById('admBar').classList.add('on');
    document.getElementById('admLoginBtn').style.display='none';
    toast('관리자 모드 활성화');
  } else {
    document.getElementById('admErr').style.display='block';
    document.getElementById('admPw').value='';
    document.getElementById('admPw').focus();
  }
}
function admLogout() {
  admMode=false; admClosePanel(); admCloseLog();
  document.body.classList.remove('adm-active');
  document.getElementById('admBar').classList.remove('on');
  document.getElementById('admLoginBtn').style.display='';
  toast('로그아웃 되었습니다');
}

// ── PANEL ──
function admOpenPanel() { renderSecList(); document.getElementById('admPanel').classList.add('on'); }
function admClosePanel() { document.getElementById('admPanel').classList.remove('on'); admCloseDialog(); }

function renderSecList() {
  document.getElementById('admSecList').innerHTML = PROFILE.sections.map((s,i)=>
    `<div class="adm-sec-item${admCurSecIdx===i?' active':''}" onclick="admSelectSec(${i})">
       <span class="sec-stamp">${s.stamp}</span>
       <span class="sec-name">${s.title_kr}</span>
     </div>`
  ).join('');
}
function admSelectSec(idx) {
  admCurSecIdx=idx;
  document.querySelectorAll('.adm-sec-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  renderEditor();
}

// ── EDITOR ──
function renderEditor(skipSort) {
  const sec = PROFILE.sections[admCurSecIdx];
  if (!sec) return;
  const headers = sec.kr.headers;
  const dateCol = detectDateCol(headers, sec.kr.rows);
  if (!skipSort && dateCol>=0 && sec.kr.rows.length>1) {
    sec.kr.rows = sortDesc(sec.kr.rows, dateCol);
    sec.en.rows = sortDesc(sec.en.rows, dateCol);
    ST('draft', PROFILE);
  }
  const sortOpts = headers.map((h,i)=>`<option value="${i}"${i===dateCol?' selected':''}>${h}</option>`).join('');
  document.getElementById('admEditor').innerHTML = `
    <div class="adm-editor-title">
      <span style="background:var(--ink);color:#fff;padding:2px 8px;font-size:9px;border-radius:1px;">${sec.stamp}</span>
      ${sec.title_kr}
      <button class="adm-add-btn" onclick="admOpenAdd()">+ 항목 추가</button>
    </div>
    <div class="adm-sort-bar">
      <label>정렬 기준:</label>
      <select class="adm-sort-sel" id="admSortCol">${sortOpts}</select>
      <button class="adm-sort-btn" onclick="admApplySort()">최신순 적용</button>
      <span class="adm-sort-hint">⠿ 드래그 또는 ▲▼ 으로 순서 조정</span>
    </div>
    <table class="adm-table">
      <thead><tr><th style="width:24px"></th>${headers.map(h=>`<th>${h}</th>`).join('')}<th style="width:120px">관리</th></tr></thead>
      <tbody id="admEditorTbody">
        ${sec.kr.rows.map((row,ri)=>`
          <tr data-ri="${ri}" draggable="true">
            <td class="adm-handle">⠿</td>
            ${row.map(c=>`<td>${c}</td>`).join('')}
            <td class="adm-actions">
              <button class="adm-row-btn mv" onclick="admMoveRow(this,-1)">▲</button>
              <button class="adm-row-btn mv" onclick="admMoveRow(this,1)">▼</button>
              <button class="adm-row-btn edit" onclick="admOpenEdit(this)">수정</button>
              <button class="adm-row-btn del" onclick="admDelRow(this)">삭제</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div class="adm-order-bar" id="admOrderBar">
      ⚠ 순서가 변경되었습니다.
      <button class="adm-save-order-btn" onclick="admSaveOrder()">이 순서로 저장</button>
    </div>`;
  initDragDrop();
}

function detectDateCol(headers, rows) {
  const kw=['기간','연도','일자','date','year','period','obtained','filed','취득'];
  for (let i=headers.length-1;i>=0;i--) if(kw.some(k=>headers[i].toLowerCase().includes(k))) return i;
  if (!rows.length) return -1;
  for (let i=rows[0].length-1;i>=0;i--) if(/\d{4}[.\/-]/.test(rows[0][i]||'')||/^\d{4}$/.test((rows[0][i]||'').trim())) return i;
  return -1;
}
function sortDesc(rows, col) {
  return [...rows].sort((a,b)=>{
    const ya=+((a[col]||'').match(/\d{4}/)||[0])[0];
    const yb=+((b[col]||'').match(/\d{4}/)||[0])[0];
    return yb-ya;
  });
}
function admApplySort() {
  const col=+document.getElementById('admSortCol').value;
  const sec=PROFILE.sections[admCurSecIdx];
  sec.kr.rows=sortDesc(sec.kr.rows,col);
  sec.en.rows=sortDesc(sec.en.rows,col);
  ST('draft',PROFILE); renderEditor(true); markOrderDirty();
}

// ── ORDER ──
function admMoveRow(btn,dir) {
  const sec=PROFILE.sections[admCurSecIdx];
  const trs=Array.from(document.getElementById('admEditorTbody').querySelectorAll('tr'));
  const idx=trs.indexOf(btn.closest('tr')), tgt=idx+dir;
  if(tgt<0||tgt>=trs.length) return;
  [sec.kr.rows[idx],sec.kr.rows[tgt]]=[sec.kr.rows[tgt],sec.kr.rows[idx]];
  [sec.en.rows[idx],sec.en.rows[tgt]]=[sec.en.rows[tgt],sec.en.rows[idx]];
  ST('draft',PROFILE); renderEditor(true); markOrderDirty();
}
function markOrderDirty() { document.getElementById('admOrderBar')?.classList.add('on'); }
function admSaveOrder() {
  renderSections(); ST('draft',PROFILE); setTodayDate();
  writeLog('order',PROFILE.sections[admCurSecIdx].title_kr,'행 순서 변경');
  toast('순서가 저장되었습니다'); renderEditor(true);
}

// ── DRAG & DROP ──
function initDragDrop() {
  const tbody=document.getElementById('admEditorTbody');
  if(!tbody) return;
  tbody.addEventListener('dragstart',e=>{
    const tr=e.target.closest('tr'); if(!tr) return;
    _dragSrc=Array.from(tbody.querySelectorAll('tr')).indexOf(tr);
    setTimeout(()=>tr.classList.add('dragging'),0);
    e.dataTransfer.effectAllowed='move';
  });
  tbody.addEventListener('dragend',e=>{
    e.target.closest('tr')?.classList.remove('dragging');
    tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
    _dragSrc=null;
  });
  tbody.addEventListener('dragover',e=>{
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    const tr=e.target.closest('tr'); if(!tr) return;
    tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
    tr.classList.add('drag-over');
  });
  tbody.addEventListener('dragleave',e=>e.target.closest('tr')?.classList.remove('drag-over'));
  tbody.addEventListener('drop',e=>{
    e.preventDefault();
    tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
    const tr=e.target.closest('tr'); if(!tr||_dragSrc===null) return;
    const tgt=Array.from(tbody.querySelectorAll('tr')).indexOf(tr);
    if(tgt===_dragSrc) return;
    const sec=PROFILE.sections[admCurSecIdx];
    const [kr]=sec.kr.rows.splice(_dragSrc,1);
    const [en]=sec.en.rows.splice(_dragSrc,1);
    sec.kr.rows.splice(tgt,0,kr);
    sec.en.rows.splice(tgt,0,en);
    ST('draft',PROFILE); renderEditor(true); markOrderDirty();
  });
}

// ── DIALOG ──
function admOpenAdd() {
  admEditCtx={isNew:true,idx:-1};
  const sec=PROFILE.sections[admCurSecIdx];
  openDialog('항목 추가',sec.kr.headers,sec.en.headers,sec.kr.headers.map(()=>''),sec.en.headers.map(()=>''));
}
function admOpenEdit(btn) {
  const trs=Array.from(document.getElementById('admEditorTbody').querySelectorAll('tr'));
  const idx=trs.indexOf(btn.closest('tr'));
  admEditCtx={isNew:false,idx};
  const sec=PROFILE.sections[admCurSecIdx];
  openDialog('항목 수정',sec.kr.headers,sec.en.headers,[...(sec.kr.rows[idx]||[])],[...(sec.en.rows[idx]||[])]);
}
function openDialog(title,krH,enH,krV,enV) {
  document.getElementById('admDialogTitle').textContent=title;
  document.getElementById('admDialogForm').innerHTML=
    '<div class="adm-dialog-fields">'+
    krH.map((h,i)=>`
      <div class="adm-dialog-row">
        <div class="adm-dfield">
          <div class="adm-dlabel">${h} <span class="lang-badge kr">KR</span>
            <button class="adm-translate-btn" data-idx="${i}" onclick="admTranslateField(${i})">▶ 영문 번역</button>
          </div>
          <input class="adm-dinput" data-kr="${i}" value="${escHtml(krV[i]||'')}" oninput="admAutoTranslate(${i},this)">
        </div>
        <div class="adm-dfield">
          <div class="adm-dlabel">${enH[i]||h} <span class="lang-badge en">EN</span></div>
          <input class="adm-dinput" data-en="${i}" id="enInput_${i}" value="${escHtml(enV[i]||'')}">
        </div>
      </div>`).join('')+
    '</div>';
  document.getElementById('admDialog').classList.add('on');
  document.querySelector('#admDialogForm .adm-dinput')?.focus();
}
function admCloseDialog() { document.getElementById('admDialog').classList.remove('on'); admEditCtx=null; }

function admSaveRow() {
  if(!admEditCtx) return;
  const {isNew,idx}=admEditCtx;
  const sec=PROFILE.sections[admCurSecIdx];
  const krVals=Array.from(document.querySelectorAll('#admDialogForm [data-kr]'))
    .sort((a,b)=>+a.dataset.kr-+b.dataset.kr).map(i=>i.value.trim());
  const enVals=Array.from(document.querySelectorAll('#admDialogForm [data-en]'))
    .sort((a,b)=>+a.dataset.en-+b.dataset.en).map(i=>i.value.trim());
  if(isNew){
    sec.kr.rows.push(krVals); sec.en.rows.push(enVals);
    writeLog('add',sec.title_kr,krVals[0]||'새 항목');
    toast('항목이 추가되었습니다');
    admCloseDialog(); ST('draft',PROFILE); setTodayDate(); renderSections(); renderEditor(false);
  } else {
    sec.kr.rows[idx]=krVals; sec.en.rows[idx]=enVals;
    writeLog('edit',sec.title_kr,krVals[0]||'항목');
    toast('항목이 수정되었습니다');
    admCloseDialog(); ST('draft',PROFILE); setTodayDate(); renderSections(); renderEditor(true);
  }
}

function admDelRow(btn) {
  if(!confirm('이 항목을 삭제하시겠습니까?')) return;
  const trs=Array.from(document.getElementById('admEditorTbody').querySelectorAll('tr'));
  const idx=trs.indexOf(btn.closest('tr'));
  const sec=PROFILE.sections[admCurSecIdx];
  const label=sec.kr.rows[idx]?.[0]||'항목';
  sec.kr.rows.splice(idx,1); sec.en.rows.splice(idx,1);
  writeLog('del',sec.title_kr,label);
  ST('draft',PROFILE); setTodayDate(); renderSections(); renderEditor(true);
  toast('항목이 삭제되었습니다');
}

// ── SAVE JSON ──
function admSaveJson() {
  if(!PROFILE) return;
  const blob=new Blob([JSON.stringify(PROFILE,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='data.json'; a.click();
  URL.revokeObjectURL(a.href);
  writeLog('edit','SYSTEM','data.json 저장');
  toast('data.json 다운로드 완료 → GitHub에 업로드하세요');
}

// ── TRANSLATION ──
const ARCH_DICT=[
  ['기록물평가심의회','Records Appraisal Review Committee'],
  ['정보공개심의회','Information Disclosure Review Committee'],
  ['기록물관리 전문요원','Records Management Professional'],
  ['기록관리전문가','Archivist'],['전자기록','Electronic Records'],
  ['기록관리시스템','Records Management System'],['기록경영시스템','Records Management System'],
  ['심의위원','Review Member'],['자문위원','Advisory Member'],
  ['평가위원','Evaluator'],['전문위원','Expert Member'],
  ['겸임교수','Adjunct Professor'],['시간강사','Part-time Instructor'],
  ['특강','Guest Lecture'],['강사','Lecturer'],
  ['국가기록원','National Archives of Korea'],
  ['행정안전부','Ministry of the Interior and Safety'],['교육부','Ministry of Education'],
  ['현재','Present'],['박사과정 수료','PhD Program Completion'],
  ['석사','Master'],['정회원','Regular Member'],['이사','Director'],
  ['컨설팅','Consulting'],['선임심사원','Lead Auditor'],
  ['출원','Filed'],['특허','Patent'],
  ['한국기록관리학회지','Journal of Korean Society of Archives and Records Management'],
];
function admAutoTranslate(idx,el){clearTimeout(_transTimers[idx]);_transTimers[idx]=setTimeout(()=>admTranslateField(idx),900);}
async function admTranslateField(idx){
  const ki=document.querySelector(`[data-kr="${idx}"]`);
  const ei=document.getElementById(`enInput_${idx}`);
  if(!ki||!ei) return;
  const text=ki.value.trim(); if(!text) return;
  const btn=document.querySelector(`[data-idx="${idx}"]`);
  const orig=btn?.innerHTML||'';
  if(btn){btn.innerHTML='번역 중<span class="adm-translate-spinner"></span>';btn.disabled=true;}
  ei.classList.add('translating');
  try{
    const res=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=en&dt=t&q=${encodeURIComponent(text)}`);
    if(!res.ok) throw new Error();
    const d=await res.json();
    let out=d[0].map(c=>c[0]).join('');
    ARCH_DICT.forEach(([k,v])=>{out=out.replace(new RegExp(v,'gi'),v);});
    ei.value=out; setTimeout(()=>ei.classList.remove('translating'),700);
  }catch(e){ei.classList.remove('translating');toast('번역 연결 실패 — 직접 입력해 주세요');}
  finally{if(btn){btn.innerHTML=orig;btn.disabled=false;}}
}

// ── LOG ──
function writeLog(action,section,label){
  const logs=ST('logs')||[];
  const n=new Date(),pad=x=>String(x).padStart(2,'0');
  const ts=`${n.getFullYear()}.${pad(n.getMonth()+1)}.${pad(n.getDate())} ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  logs.unshift({ts,action,section,label});
  ST('logs',logs.slice(0,500));
}
function admOpenLog(){renderLog(logFilter);document.getElementById('admLogPanel').classList.add('on');}
function admCloseLog(){document.getElementById('admLogPanel').classList.remove('on');}
function renderLog(filter){
  const logs=(ST('logs')||[]).filter(l=>filter==='all'||l.action===filter);
  const labels={add:'추가',edit:'수정',del:'삭제',order:'순서'};
  document.getElementById('admLogList').innerHTML=logs.length
    ?logs.map(l=>`<div class="adm-log-entry">
        <span class="adm-log-time">${l.ts}</span>
        <span class="adm-log-action ${l.action}">${labels[l.action]||l.action}</span>
        <span class="adm-log-desc"><b>${l.section}</b> — ${l.label}</span>
      </div>`).join('')
    :'<div class="adm-log-empty">변경 로그가 없습니다.</div>';
}
function admFilterLog(f,btn){
  logFilter=f;
  document.querySelectorAll('.adm-log-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderLog(f);
}
function admClearLog(){if(!confirm('로그를 모두 삭제할까요?')) return; ST('logs',[]); renderLog(logFilter); toast('로그가 초기화되었습니다');}

// ── PASSWORD ──
function admOpenPwChange(){document.getElementById('admPwModal').classList.add('on');setTimeout(()=>document.getElementById('pwCurrent').focus(),50);}
function admClosePwChange(){document.getElementById('admPwModal').classList.remove('on');}
function admSavePw(){
  const cur=document.getElementById('pwCurrent').value;
  const nw=document.getElementById('pwNew').value;
  const cf=document.getElementById('pwConfirm').value;
  const err=document.getElementById('pwErr');
  err.style.display='none';
  if(cur!==getPass()){err.textContent='⚠ 현재 비밀번호가 틀렸습니다.';err.style.display='block';document.getElementById('pwCurrent').value='';return;}
  if(nw.length<4){err.textContent='⚠ 4자 이상 입력하세요.';err.style.display='block';return;}
  if(nw!==cf){err.textContent='⚠ 비밀번호가 일치하지 않습니다.';err.style.display='block';document.getElementById('pwConfirm').value='';return;}
  ST('pass',nw); admClosePwChange(); toast('비밀번호가 변경되었습니다');
}

// ── UTILS ──
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _toastT;
function toast(msg){
  const el=document.getElementById('admToast');el.textContent=msg;el.classList.add('on');
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('on'),2600);
}
function bindKeys(){
  document.addEventListener('keydown',e=>{
    if(e.key!=='Escape') return;
    if(document.getElementById('admDialog').classList.contains('on')) admCloseDialog();
    else if(document.getElementById('admPanel').classList.contains('on')) admClosePanel();
    else if(document.getElementById('admLogPanel').classList.contains('on')) admCloseLog();
    else if(document.getElementById('admLogin').classList.contains('on')) admHideLogin();
    else if(document.getElementById('admPwModal').classList.contains('on')) admClosePwChange();
  });
  document.getElementById('admPw').addEventListener('keydown',e=>{if(e.key==='Enter') admDoLogin();});
  document.getElementById('admLogin').addEventListener('click',e=>{if(e.target===document.getElementById('admLogin')) admHideLogin();});
  document.getElementById('admPwModal').addEventListener('click',e=>{if(e.target===document.getElementById('admPwModal')) admClosePwChange();});
}
